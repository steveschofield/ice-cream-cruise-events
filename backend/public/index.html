<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ice Cream Cruisers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .event-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .event-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
    }

    .event-card h3 {
      font-size: 18px;
      color: #333;
      margin-bottom: 8px;
    }

    .event-card .event-detail {
      font-size: 14px;
      color: #666;
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-card .event-detail strong {
      color: #333;
    }

    .event-detail-label {
      color: #999;
      min-width: 80px;
    }

    .waypoint-count {
      display: inline-block;
      background: #007AFF;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 16px;
    }

    .error {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .empty {
      background: white;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍦 Ice Cream Cruisers</h1>
      <p>Upcoming Events</p>
    </header>

    <div id="content" class="loading">Loading events...</div>
  </div>

  <script>
    async function loadEvents() {
      try {
        const response = await fetch('/api/events');
        if (!response.ok) throw new Error('Failed to load events');

        const events = await response.json();
        const contentDiv = document.getElementById('content');

        if (!events || events.length === 0) {
          contentDiv.innerHTML = '<div class="empty">No events scheduled yet</div>';
          return;
        }

        contentDiv.innerHTML = '<div class="events-list">' +
          events.map(event => `
            <a href="/modal?eventId=${event.id}" class="event-card">
              <h3>${escapeHtml(event.name)}</h3>
              <div class="event-detail">
                <span class="event-detail-label">📅 Date:</span>
                <span>${escapeHtml(event.date)}</span>
              </div>
              <div class="event-detail">
                <span class="event-detail-label">🕐 Event:</span>
                <span>${escapeHtml(event.eventTime || 'TBD')}</span>
              </div>
              <div class="event-detail">
                <span class="event-detail-label">🚗 Cruise:</span>
                <span>${escapeHtml(event.cruiseStartTime || 'TBD')}</span>
              </div>
              <div class="event-detail">
                <span class="event-detail-label">📍 Meeting:</span>
                <span>${escapeHtml(event.meetingPoint)}</span>
              </div>
              <div class="event-detail">
                <span class="event-detail-label">📝 Route:</span>
                <span class="waypoint-count">${event.waypoints ? event.waypoints.length : 0} waypoints</span>
              </div>
            </a>
          `).join('') + '</div>';
      } catch (error) {
        console.error('Error loading events:', error);
        document.getElementById('content').innerHTML =
          '<div class="error">Failed to load events. Please try again.</div>';
      }
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    loadEvents();
  </script>
</body>
</html>
